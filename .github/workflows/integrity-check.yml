name: Outty CI - Import Integrity

on:
  push:
    branches: [ "main" ] # Triggers every time you merge to master/main
  pull_request:
    branches: [ "main" ]

jobs:
  integrity-check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Run Import & Type Check
        # This acts as our "test" to ensure the code builds and imports correctly
        run: npx tsc --noEmit --skipLibCheck
