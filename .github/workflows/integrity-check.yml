name: Outty-App CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          # Using root lockfile as seen in your file explorer
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm install
        
      - name: Install Server Dependencies
        run: npm install
        working-directory: App/server
        
      - name: Rubric Check 1 - Linting
        # This will run the lint script defined in your root package.json
        run: npm run lint

      - name: Rubric Check 2 - Unit Tests
        # This will trigger tests, including those in App/server/tests/
        run: npm run test

      - name: Rubric Check 3 - Production Build
        run: npm run build
